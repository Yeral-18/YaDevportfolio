<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoja Membretada - P&amp;J Multiservicios S.A.S</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap");

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
      font-family: "Montserrat", Arial, sans-serif;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 40px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP HEADER ===== */
    .header {
      width: 100%;
      height: 82px;
      background: #0089D0;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .header-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .header-logo {
      position: relative;
      z-index: 10;
      padding-left: 22px;
      display: flex;
      align-items: center;
    }

    .header-logo img {
      height: 60px;
      width: auto;
      object-fit: contain;
    }

    /* Separator */
    .header-separator {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #8CC63F 0%, #005B32 55%, #0089D0 100%);
      flex-shrink: 0;
    }

    /* ===== BODY ===== */
    .body {
      position: relative;
      flex: 1;
      padding: 30px 40px 20px 40px;
      display: flex;
      flex-direction: column;
    }

    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 290px;
      height: 290px;
      opacity: 0.042;
      pointer-events: none;
      z-index: 0;
    }

    .watermark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .content-area {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    /* ===== CONTACT SECTION ===== */
    .contact-section {
      position: relative;
      z-index: 1;
      padding: 10px 40px 6px 40px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 8.5px;
      color: #555555;
      font-family: "Montserrat", Arial, sans-serif;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .contact-icon {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== FOOTER ===== */
    .footer {
      width: 100%;
      height: 66px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .footer-svg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ===== PRINT ===== */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .page {
        box-shadow: none;
        width: 210mm;
        min-height: 297mm;
        margin: 0;
      }
      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>
