<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta de Presentacion - Luqra Ingenieria y Soluciones S.A.S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-base: #0A2A66;
      --blue-mid:  #123C8C;
      --blue-light:#1F5FBF;
      --orange-base: #FF6A00;
      --orange-mid:  #FF8C1A;
      --ink:    #1A1A1A;
      --muted:  #6B7280;
    }

    body {
      background: #d0d0d0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
      gap: 12px;
      font-family: "Plus Jakarta Sans", "Inter", Arial, sans-serif;
      color: var(--ink);
    }

    .label {
      font-family: "Inter", Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      font-weight: 600;
      margin-top: 8px;
    }

    .card {
      width: 90mm;
      height: 55mm;
      background: #fff;
      box-shadow: 0 4px 22px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
      page-break-inside: avoid;
    }

    /* ============ FRONT ============ */
    .card.front {
      background: var(--blue-base);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7mm 10mm;
      position: relative;
    }

    .front .logo-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 100%;
    }
    .front .logo-wrap img {
      width: 52mm;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: brightness(0) invert(1); /* logo en blanco sobre azul */
      image-rendering: -webkit-optimize-contrast;
    }
    .front .razon {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 7pt;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      margin-top: 3mm;
    }

    /* Accent triangle naranja — esquina inferior derecha */
    .front::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 14mm;
      height: 14mm;
      background: var(--orange-base);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      z-index: 1;
    }
    /* Detalle azul-claro sutil para profundidad */
    .front::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 22mm;
      height: 22mm;
      background: var(--blue-mid);
      clip-path: polygon(0 0, 100% 0, 0 100%);
      opacity: 0.55;
      z-index: 1;
    }

    /* ============ BACK ============ */
    .card.back {
      background: #fff;
      padding: 6mm 7mm 6mm 7mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* Mini logo top-left */
    .back .mini-logo {
      position: absolute;
      top: 5mm;
      right: 6mm;
      width: 18mm;
      height: auto;
      opacity: 0.92;
      image-rendering: -webkit-optimize-contrast;
    }

    .back .person {
      max-width: 60mm;
    }
    .back .nombre {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 11pt;
      font-weight: 800;
      color: var(--blue-base);
      letter-spacing: -0.2px;
      line-height: 1.15;
    }
    .back .cargo {
      font-family: "Inter", sans-serif;
      font-size: 7pt;
      font-weight: 600;
      color: var(--blue-light);
      letter-spacing: 1.6px;
      text-transform: uppercase;
      margin-top: 1mm;
    }

    /* Accent bar 80/20 separador */
    .back .bar {
      display: flex;
      height: 1.2pt;
      width: 28mm;
      margin: 2mm 0 2.5mm 0;
    }
    .back .bar .blue   { background: var(--blue-base);   flex: 80; }
    .back .bar .orange { background: var(--orange-base); flex: 20; }

    .back .contact {
      display: flex;
      flex-direction: column;
      gap: 0.6mm;
      font-family: "Inter", sans-serif;
      font-size: 7.2pt;
      color: var(--ink);
      line-height: 1.4;
    }
    .back .contact .row {
      display: flex;
      gap: 2mm;
      align-items: center;
    }
    .back .contact .lbl {
      color: var(--orange-base);
      font-weight: 700;
      font-size: 6.8pt;
      width: 4mm;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .back .contact .todo {
      color: #B45309;
      background: #FEF3C7;
      padding: 0 1.5mm;
      border-radius: 1pt;
      font-size: 6.8pt;
      font-weight: 600;
    }

    .back .areas {
      font-family: "Inter", sans-serif;
      font-size: 6pt;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 1.5mm;
      line-height: 1.4;
    }
    .back .areas .dot {
      color: var(--orange-base);
      font-weight: 700;
      margin: 0 1.5mm;
    }

    /* Footer accent strip naranja */
    .back::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1.6mm;
      background: linear-gradient(90deg,
        var(--blue-base)   0%,
        var(--blue-base)  78%,
        var(--orange-base) 78%,
        var(--orange-base) 100%);
    }

    /* ===== PRINT ===== */
    @media print {
      body {
        background: #fff;
        padding: 0;
        margin: 0;
        gap: 6mm;
        align-items: center;
        justify-content: flex-start;
      }
      .label { display: none; }
      .card {
        box-shadow: none;
        margin: 4mm 0;
      }
      @page {
        size: 110mm 140mm; /* hoja con sangrado para imprenta */
        margin: 8mm;
      }
    }
  </style>
</head>
